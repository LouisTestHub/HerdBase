<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HerdBase — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: white; border-radius: 1rem; padding: 3rem 2rem; max-width: 24rem; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .icon { width: 4rem; height: 4rem; background: #ecfdf5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.5rem; }
    h1 { font-size: 1.5rem; color: #111827; margin-bottom: .5rem; }
    p { color: #6b7280; font-size: .875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button { background: #047857; color: white; border: none; padding: .75rem 2rem; border-radius: .5rem; font-size: .875rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #065f46; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You&apos;re offline</h1>
    <p>No worries — any changes you've made are saved locally and will sync automatically when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
